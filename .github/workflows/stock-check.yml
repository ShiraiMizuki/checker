name: AstroVials Stock Checker

on:
  repository_dispatch:
    types: [trigger-stock-check]   # Allows cron-job.org to trigger it
  workflow_dispatch:               # Allows you to press the button manually

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Run stock checker
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python stock_checker.py
